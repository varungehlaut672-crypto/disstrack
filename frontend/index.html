<!DOCTYPE html>
<html>
<head>
  <title>Disaster Globe</title>
  <style>
    body { margin: 0; }
    #globeViz { width: 100vw; height: 100vh; }
  </style>
</head>

<body>

<button id="toggleRotate" style="
position:absolute;
top:10px;
left:10px;
z-index:1000;
padding:8px 12px;
border-radius:6px;
border:none;
cursor:pointer;
">
Toggle Rotation
</button>

<div id="globeViz"></div>

<div id="sidebar" style="
position:absolute;
right:0;
top:0;
width:320px;
height:100vh;
background:#0f0f0f;
color:white;
padding:20px;
transform:translateX(100%);
transition:0.3s;
z-index:1000;
font-family:Segoe UI, sans-serif;
overflow-y:auto;
box-shadow:-5px 0 15px rgba(0,0,0,0.5);
">
<h2>🌍 Disaster Info</h2>
<p>Click a country</p>
</div>


<!-- GRAPH CANVAS -->
<canvas id="chart" style="
position:absolute;
bottom:20px;
left:20px;
width:400px;
height:200px;
background:white;
border-radius:10px;
z-index:9999;
"></canvas>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
