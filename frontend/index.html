<!DOCTYPE html>
<html>
<head>
  <title>Disaster Globe</title>
  <style>
    body { margin: 0; }
    #globeViz { width: 100vw; height: 100vh; }
  </style>
</head>

<body>

<div id="globeViz"></div>

<!-- INFO PANEL (optional but recommended) -->
<div id="info" style="
position:absolute;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:8px;
z-index:1000;
">
Click a country
</div>

<!-- GRAPH CANVAS -->
<canvas id="chart" style="
position:absolute;
bottom:10px;
left:10px;
width:400px;
height:200px;
background:white;
border-radius:10px;
padding:10px;
"></canvas>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
